<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

    .bg-critical {
      background-color: #ff4d4d !important;
      color: white !important;
    }
    .bg-critical td {
      background-color: transparent !important;
      color: white !important;
      border-color: rgba(255,255,255,0.2) !important;
    }

    .item-row {
      background: white; padding: 15px; margin-top: 12px; border-radius: 12px;
      border-left: 6px solid #0d6efd; border: 1px solid #ddd;
    }
    #reader { width: 100% !important; border-radius: 10px; overflow: hidden; background: #000; }
    .text-end { text-align: right !important; }
    .nav-pills .nav-link { font-weight: 600; color: #666; }
    .nav-pills .nav-link.active { background-color: #0d6efd; }
  </style>
</head>
<body>

<div class="container py-3">
  <h4 class="text-center fw-bold text-primary mb-3">SES - STOCK</h4>

  <ul class="nav nav-pills nav-fill mb-3" id="pills-tab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#out-page" onclick="closeScanner()">เบิกออก</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#in-page" onclick="closeScanner()">รับเข้า</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#stock-page" onclick="closeScanner(); loadStock();">STOCK</button></li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="out-page">
      <div class="card p-3 shadow-sm">
        <label class="fw-bold small mb-1 text-muted">ผู้บันทึก</label>
        <select class="form-select user-list mb-3" id="user-out"></select>
        <button class="btn btn-primary w-100 py-3 fw-bold mb-2" onclick="openScanner('out')">📷 สแกน QR Code (เบิกออก)</button>
        <div id="out-list"></div>
        <button class="btn btn-danger w-100 mt-4 py-2 fw-bold" onclick="saveData('out')">บันทึกเบิกออก</button>
      </div>
    </div>

    <div class="tab-pane fade" id="in-page">
      <div class="card p-3 shadow-sm">
        <label class="fw-bold small mb-1 text-muted">ผู้บันทึก</label>
        <select class="form-select user-list mb-3" id="user-in"></select>
        <button class="btn btn-dark w-100 py-3 fw-bold mb-2" onclick="openScanner('in')">📷 สแกน QR Code (รับเข้า)</button>
        <div id="in-list"></div>
        <button class="btn btn-success w-100 mt-4 py-2 fw-bold" onclick="saveData('in')">บันทึกรับเข้า</button>
      </div>
    </div>

    <div class="tab-pane fade" id="stock-page">
      <div class="card p-3 shadow-sm">
        <div class="input-group mb-2">
          <input type="text" id="searchBox" class="form-control" placeholder="ค้นหาชื่อรายการ..." onkeyup="if(event.keyCode==13) loadStock()">
          <button class="btn btn-primary" onclick="loadStock()">ค้นหา</button>
        </div>
        <div class="table-responsive">
          <table class="table table-bordered align-middle shadow-sm">
            <thead class="table-light text-center">
              <tr><th>รายการ</th><th>ตำแหน่ง</th><th>SS</th><th>คงเหลือ</th></tr>
            </thead>
            <tbody id="stock-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="scanModal" data-bs-backdrop="static" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">สแกนรหัสสินค้า</h5>
        <button type="button" class="btn-close" onclick="closeScanner()"></button>
      </div>
      <div class="modal-body p-0">
        <div id="reader-container"><div id="reader"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://script.google.com/macros/s/AKfycbxMLvV2M-Q0uY_Qk8AAFLaVPpn5sJwMdzMUO1JTaG1BEmbhTqoanLcideMw_v31aR3YlA/exec"></script>
<script>
  // ==========================================
  // 🔧 ตั้งค่า URL ของ Google Apps Script Web App
  // ==========================================
  const GAS_URL = "YOUR_GAS_WEB_APP_URL"; // <-- วาง URL ที่ได้จาก Deploy ตรงนี้

  // Helper: เรียก GAS backend ด้วย fetch
  async function callGAS(action, params = {}) {
    const url = new URL(GAS_URL);
    url.searchParams.set("action", action);
    for (const [key, val] of Object.entries(params)) {
      url.searchParams.set(key, typeof val === "object" ? JSON.stringify(val) : val);
    }
    const res = await fetch(url.toString());
    return res.json();
  }

  let html5QrCode;
  let currentMode = '';
  const scanModal = new bootstrap.Modal(document.getElementById('scanModal'));

  window.onload = async () => {
    const users = await callGAS("getUsers");
    const options = users.map(u => `<option value="${u}">${u}</option>`).join('');
    document.querySelectorAll('.user-list').forEach(el => el.innerHTML = options);
    loadStock();
  };

  async function openScanner(mode) {
    currentMode = mode;
    if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
    document.getElementById('reader-container').innerHTML = '<div id="reader"></div>';
    scanModal.show();
    setTimeout(() => {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (decodedText) => {
        addItem(decodedText);
        closeScanner();
      }).catch(() => { alert("ไม่สามารถเข้าถึงกล้องได้"); scanModal.hide(); });
    }, 600);
  }

  async function closeScanner() {
    if (html5QrCode) {
      try {
        if (html5QrCode.isScanning) { await html5QrCode.stop(); }
        await html5QrCode.clear();
      } catch(e) {}
    }
    scanModal.hide();
  }

  async function addItem(code) {
    const item = await callGAS("getProductByCode", { code });
    if (!item) return alert("ไม่พบรหัสสินค้าในระบบ: " + code);
    const container = document.getElementById(`${currentMode}-list`);
    const rowId = "item-" + Date.now();

    const html = `
      <div class="item-row shadow-sm" id="${rowId}">
        <div class="fw-bold mb-2 text-dark fs-6">${item.name} (${item.code})</div>
        <div class="row g-2">
          <div class="col-4">
            <label class="small text-muted d-block text-center">คงเหลือ</label>
            <input type="number" class="form-control text-center bg-light fw-bold" value="${item.stock}" readonly>
          </div>
          <div class="col-5">
            <label class="small text-muted d-block text-center">${currentMode === 'out' ? 'เบิกออก' : 'รับเข้า'}</label>
            <input type="number" class="form-control text-center border-primary qty-input fw-bold" value="1"
              data-code="${item.code}" data-name="${item.name}" onfocus="this.select()"
              ${currentMode === 'out' ? `oninput="validateOut(this, ${item.stock})"` : ''}>
          </div>
          <div class="col-3 d-flex align-items-end">
            <button class="btn btn-outline-danger w-100 fw-bold" onclick="document.getElementById('${rowId}').remove()">ลบ</button>
          </div>
        </div>
      </div>`;
    container.insertAdjacentHTML('afterbegin', html);
  }

  function validateOut(input, maxStock) {
    const val = parseFloat(input.value);
    if (val > maxStock) {
      alert("⚠️ จำนวนที่เบิก (" + val + ") มากกว่าสินค้าคงเหลือ (" + maxStock + ")");
      input.value = maxStock;
    } else if (val < 0) {
      input.value = 0;
    }
  }

  async function loadStock() {
    const query = document.getElementById('searchBox').value;
    const data = await callGAS("getStockData", { query });
    const tbody = document.getElementById('stock-body');
    tbody.innerHTML = '';

    data.forEach(row => {
      const ss = parseFloat(row[2]) || 0;
      const bal = parseFloat(row[3]) || 0;
      const tr = document.createElement('tr');
      if (bal <= ss) tr.className = 'bg-critical';
      tr.innerHTML = `
        <td>${row[0]}</td>
        <td class="text-center">${row[1]}</td>
        <td class="text-end">${row[2]}</td>
        <td class="text-end fw-bold">${row[3]}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function saveData(type) {
    const user = document.getElementById(`user-${type}`).value;
    const items = [];
    document.querySelectorAll(`#${type}-list .qty-input`).forEach(input => {
      items.push({ code: input.dataset.code, name: input.dataset.name, qty: input.value });
    });

    if (items.length === 0) return alert("กรุณาสแกนรายการสินค้าก่อน!");

    await callGAS("saveTransaction", { type, user, items });
    alert("บันทึกข้อมูลเรียบร้อยแล้ว");
    document.getElementById(`${type}-list`).innerHTML = '';
    loadStock();
  }
</script>
</body>
</html>
